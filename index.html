    <nav>
        <div class="logo">Anchor <span>&</span> Shadow</div>

            <a href="search.html">放 映 室</a>
            <a href="login.html">访 客 登 记</a>
        </div>

    <div class="container hero">
        <h1>在光影的缝隙中，重逢旧日字句</h1>
        <p>如《赎罪》般盛夏光年的油画质感，或是《花样年华》里潮湿幽暗的街灯。<br>输入一个意象，为您寻找文学名著中的段落，并匹配那一帧绝美的电影胶片。</p>
        <div style="margin-top: 50px;">
            <a href="search.html" class="btn btn-primary">翻 开 序 章</a>
        </div>
    </div>

    <div class="container" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; margin-top: 20px;">
        <div class="vintage-card">
            <h3>I . 纸张的温度</h3>
            <p>基于经典文学语料库，从毛姆的月亮到马尔克斯的细雨，提取最具画面感的文字意象。</p>
        </div>
        <div class="vintage-card" style="border-top-color: var(--accent-red);">
            <h3>II . 胶片的显影</h3>
            <p>跨越媒介的界限，用老电影的色调、构图与光影，为单薄的文字补全视觉的余味。</p>
        </div>
    </div>
